<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>僑委會取件日計算</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      height: 100dvh;
      overflow: hidden;
      background: #f0f4f8;
      font-family: "Microsoft JhengHei", "蘋方-繁", "PingFang TC", sans-serif;
      display: flex;
      flex-direction: column;
      padding: 16px 20px 16px;
      gap: 12px;
    }

    /* ── 標頭 ── */
    header {
      text-align: center;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.2rem;
      color: #555;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }

    header .phone-line {
      font-size: 1.1rem;
      color: #555;
      letter-spacing: 1px;
    }

    header .phone-line a {
      color: #1565c0;
      text-decoration: none;
      font-weight: bold;
      font-size: 1.35rem;
    }

    header .floor-line {
      font-size: 0.9rem;
      color: #999;
      letter-spacing: 2px;
      margin-top: 2px;
    }

    /* ── 日期選擇器 ── */
    .date-picker-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #fff;
      border-radius: 12px;
      padding: 10px 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .date-picker-wrap label { font-size: 0.95rem; color: #555; white-space: nowrap; }

    #date-input {
      font-size: 0.95rem;
      font-family: inherit;
      border: 2px solid #d0d8e4;
      border-radius: 8px;
      padding: 5px 10px;
      color: #333;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }
    #date-input:focus { border-color: #1e88e5; }

    #input-weekday { font-size: 0.95rem; color: #444; font-weight: bold; }

    #reset-btn {
      font-size: 0.82rem;
      font-family: inherit;
      background: #e8f0fe;
      color: #1565c0;
      border: none;
      border-radius: 8px;
      padding: 5px 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }
    #reset-btn:hover { background: #c5d8fb; }

    #nonwork-warn {
      display: none;
      align-items: center;
      background: #fff3cd;
      color: #856404;
      border: 1px solid #ffc107;
      border-radius: 8px;
      padding: 4px 12px;
      font-size: 0.82rem;
      white-space: nowrap;
    }

    /* ── 2×2 格 ── */
    .grid {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 14px;
      min-height: 0;
    }

    /* ── 取件卡片 ── */
    .card {
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px 20px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.10);
      overflow: hidden;
    }

    .card.blue  { background: linear-gradient(145deg, #1565c0, #1e88e5); color: #fff; }
    .card.green { background: linear-gradient(145deg, #2e7d32, #43a047); color: #fff; }

    .card-title   { font-size: 1.3rem; font-weight: bold; letter-spacing: 2px; margin-bottom: 2px; opacity: .95; }
    .card-days    { font-size: 0.85rem; opacity: .75; margin-bottom: 10px; }
    .card-date    { font-size: clamp(2.4rem, 4vw, 3.6rem); font-weight: 900; line-height: 1; margin-bottom: 4px; }
    .card-weekday { font-size: 1.3rem; font-weight: 600; opacity: .9; }

    .days-remaining {
      margin-top: 10px;
      background: rgba(255,255,255,0.2);
      border-radius: 30px;
      padding: 5px 18px;
      font-size: 0.88rem;
    }

    /* ── 役齡卡片 ── */
    .mil-card {
      background: #fff;
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px 20px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.07);
      overflow: hidden;
    }

    .mil-card-label { font-size: 1.1rem; color: #666; letter-spacing: 1px; margin-bottom: 2px; }
    .mil-card-age   { font-size: 0.85rem; color: #aaa; margin-bottom: 8px; }
    .mil-card-years { font-size: clamp(1.5rem, 3vw, 2.2rem); font-weight: 900; color: #333; }
  </style>
</head>
<body>

<header>
  <h1>僑委會取件日期計算</h1>
  <div class="phone-line">
    南部證照服務站　<a href="tel:0777150300">07-715-0300</a>　分機 219 或 281
  </div>
  <div class="floor-line">三樓 外交部　｜　五樓 移民署</div>
</header>

<div class="date-picker-wrap">
  <label for="date-input">辦理日期：</label>
  <input type="date" id="date-input">
  <span id="input-weekday"></span>
  <button id="reset-btn">回到今天</button>
  <span id="nonwork-warn">⚠️ 非工作日，已自動調整至下一個工作日</span>
</div>

<div class="grid">
  <!-- 取件卡 -->
  <div class="card green">
    <div class="card-title">僑民身分證明書</div>
    <div class="card-days">3 個工作天</div>
    <div class="card-date"    id="d2-date"></div>
    <div class="card-weekday" id="d2-weekday"></div>
    <div class="days-remaining" id="d2-remain"></div>
  </div>
  <div class="card blue">
    <div class="card-title">僑居加簽</div>
    <div class="card-days">4 個工作天</div>
    <div class="card-date"    id="d1-date"></div>
    <div class="card-weekday" id="d1-weekday"></div>
    <div class="days-remaining" id="d1-remain"></div>
  </div>

  <!-- 役齡卡 -->
  <div class="mil-card">
    <div class="mil-card-label">接近役齡男子</div>
    <div class="mil-card-age">16 ～ 18 歲</div>
    <div class="mil-card-years" id="mil-near"></div>
  </div>
  <div class="mil-card">
    <div class="mil-card-label">役齡男子</div>
    <div class="mil-card-age">19 ～ 36 歲</div>
    <div class="mil-card-years" id="mil-active"></div>
  </div>
</div>

<script>
  const EXTRA_HOLIDAYS = new Set([
    '2026-01-01',
    '2026-02-16','2026-02-17','2026-02-18','2026-02-19','2026-02-20',
    '2026-02-27',
    '2026-04-03',
    '2026-05-01',
    '2026-06-19',
    '2026-09-25',
    '2026-09-28',
    '2026-10-09',
    '2026-10-26',
    '2026-12-25',
  ]);

  const WEEKDAYS = ['日','一','二','三','四','五','六'];

  function getTaiwanToday() {
    const tw = new Date(Date.now() + 8 * 3600000);
    return tw.toISOString().slice(0, 10);
  }

  function parseDate(str) {
    const [y, m, d] = str.split('-').map(Number);
    return new Date(Date.UTC(y, m - 1, d));
  }

  function toKey(date) {
    return `${date.getUTCFullYear()}-${String(date.getUTCMonth()+1).padStart(2,'0')}-${String(date.getUTCDate()).padStart(2,'0')}`;
  }

  function isNonWorkingDay(date) {
    const dow = date.getUTCDay();
    return dow === 0 || dow === 6 || EXTRA_HOLIDAYS.has(toKey(date));
  }

  function addWorkingDays(base, n) {
    const d = new Date(base);
    let count = 0;
    while (count < n) { d.setUTCDate(d.getUTCDate() + 1); if (!isNonWorkingDay(d)) count++; }
    return d;
  }

  function nearestWorkingDay(str) {
    const d = parseDate(str);
    while (isNonWorkingDay(d)) d.setUTCDate(d.getUTCDate() + 1);
    return toKey(d);
  }

  function formatCard(prefix, pickup, base) {
    const m = pickup.getUTCMonth() + 1, d = pickup.getUTCDate();
    const diff = Math.round((pickup - base) / 86400000);
    document.getElementById(prefix+'-date').textContent    = `${m}月${d}日`;
    document.getElementById(prefix+'-weekday').textContent = `星期${WEEKDAYS[pickup.getUTCDay()]}`;
    document.getElementById(prefix+'-remain').textContent  = diff === 0 ? '今天可取件' : `距今 ${diff} 天後可取件`;
  }

  const input = document.getElementById('date-input');
  const warn  = document.getElementById('nonwork-warn');

  function setDate(str) {
    const adj = nearestWorkingDay(str);
    input.value = adj;
    warn.style.display = adj !== str ? 'flex' : 'none';
    const d = parseDate(adj);
    document.getElementById('input-weekday').textContent = `（星期${WEEKDAYS[d.getUTCDay()]}）`;
    const base = parseDate(adj);
    formatCard('d1', addWorkingDays(base, 4), base);
    formatCard('d2', addWorkingDays(base, 3), base);
  }

  setDate(getTaiwanToday());
  input.addEventListener('change', () => { if (input.value) setDate(input.value); });
  document.getElementById('reset-btn').addEventListener('click', () => setDate(getTaiwanToday()));

  // 役齡
  const y = parseInt(getTaiwanToday().slice(0, 4));
  document.getElementById('mil-near').textContent   = `${y-18} 年 ～ ${y-16} 年出生`;
  document.getElementById('mil-active').textContent = `${y-36} 年 ～ ${y-19} 年出生`;
</script>
</body>
</html>
